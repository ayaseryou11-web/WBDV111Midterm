<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ScholarPortal - Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{
  display:flex;
  min-height:100vh;
  background:#eef3f9;
}

/* BACKGROUND LOGO */
body::before{
  content:"";
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%, -50%);
  width:400px;
  height:400px;
  background:url('logo.png') no-repeat center/contain;
  opacity:0.05;
  z-index:0;
}

/* SIDEBAR */
.sidebar{
  width:260px;
  background:linear-gradient(180deg,#0a3d62,#1e5f9a);
  color:#fff;
  padding:20px;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
  position:relative;
  z-index:1;
}

.logo{
  display:flex;
  align-items:center;
  gap:10px;
  margin-bottom:30px;
}

.logo img{width:45px;}

.nav-links{
  display:flex;
  flex-direction:column;
  gap:10px;
}

.nav-links a{
  color:#fff;
  padding:12px;
  border-radius:12px;
  text-decoration:none;
  cursor:pointer;
  transition:0.3s;
}

.nav-links a:hover{
  background:rgba(255,255,255,0.15);
  transform:translateX(5px);
}

.nav-links .active{
  background:#f1c40f;
  color:#0a3d62;
  font-weight:600;
}

.logout{
  padding:12px;
  border:none;
  border-radius:12px;
  background:#f1c40f;
  color:#0a3d62;
  cursor:pointer;
  font-weight:600;
}

/* MAIN */
.main{
  flex:1;
  padding:30px;
  overflow-y:auto;
  position:relative;
  z-index:1;
}

.header{
  margin-bottom:20px;
}

.header h1{
  color:#0a3d62;
}

.user-info{
  color:#666;
  margin-top:5px;
}

/* WELCOME */
.welcome{
  background:linear-gradient(135deg,#1e5f9a,#0a3d62);
  color:#fff;
  padding:25px;
  border-radius:18px;
  margin-bottom:25px;
}

/* CARDS */
.cards{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
  gap:20px;
}

.card{
  background:#fff;
  padding:20px;
  border-radius:18px;
  box-shadow:0 6px 15px rgba(0,0,0,0.08);
  transition:0.3s;
}

.card:hover{
  transform:translateY(-5px);
}

.card h3{
  color:#1e5f9a;
  margin-bottom:10px;
}

/* MODALS */
.modal{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.6);
  display:none;
  justify-content:center;
  align-items:center;
  z-index:999;
}

.modal-content{
  background:#fff;
  padding:25px;
  border-radius:18px;
  width:90%;
  max-width:500px;
}

.modal-content h2{
  margin-bottom:15px;
  color:#0a3d62;
}

.modal-content input,
.modal-content select,
.modal-content textarea{
  width:100%;
  padding:10px;
  margin-bottom:10px;
  border-radius:10px;
  border:1px solid #ccc;
}

.modal-content button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:12px;
  background:#1e5f9a;
  color:#fff;
  cursor:pointer;
}

/* COURSES */
.course-item{
  padding:10px;
  border:1px solid #ccc;
  border-radius:10px;
  margin-bottom:8px;
  cursor:pointer;
  transition:0.2s;
}

.course-item:hover{
  background:#f1c40f;
}

.selected{
  background:#1e5f9a;
  color:#fff;
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <div>
    <div class="logo">
      <img src="logo.png">
      <h2>ScholarPortal</h2>
    </div>

    <div class="nav-links">
      <a class="active">Dashboard</a>
      <a onclick="openModal('profileModal')">Profile</a>
      <a onclick="openModal('coursesModal')">Courses</a>
      <a onclick="openModal('registerModal')">Register</a>
      <a href="transcript.html">Transcript</a>
    </div>
  </div>

  <button class="logout" onclick="logout()">Logout</button>
</div>

<!-- MAIN -->
<div class="main">
  <div class="header">
    <h1>Student Dashboard</h1>
    <div class="user-info" id="userInfo"></div>
  </div>

  <div class="welcome">
    <h3>Welcome to ScholarPortal 🎓</h3>
    <p>Your centralized academic hub.</p>
  </div>

  <div class="cards">
    <div class="card">
      <h3>Enrolled Courses</h3>
      <div id="courseList"></div>
    </div>

    <div class="card">
      <h3>Announcements</h3>
      <p>📅 Midterms coming soon</p>
      <p>📢 Registration ongoing</p>
    </div>

    <div class="card">
      <h3>Registration Status</h3>
      <div id="regStatus">Not Registered</div>
    </div>
  </div>
</div>

<!-- PROFILE MODAL -->
<div class="modal" id="profileModal">
  <div class="modal-content">
    <h2>Profile</h2>
    <input type="text" id="fullName" placeholder="Full Name">
    <textarea id="desc" placeholder="About you"></textarea>
    <input type="text" id="fixedID" disabled>
    <input type="text" id="fixedProg" disabled>
    <button onclick="saveProfile()">Save Changes</button>
  </div>
</div>

<!-- COURSES MODAL -->
<div class="modal" id="coursesModal">
  <div class="modal-content">
    <h2>Select Courses</h2>
    <div id="coursesContainer"></div>
    <button onclick="saveCourses()">Enroll</button>
  </div>
</div>

<!-- REGISTER MODAL -->
<div class="modal" id="registerModal">
  <div class="modal-content">
    <h2>Register</h2>
    <input type="text" id="schoolYear" placeholder="School Year">
    <select id="semester">
      <option>1st Sem</option>
      <option>2nd Sem</option>
    </select>
    <select id="yearLevel">
      <option>1st Year</option>
      <option>2nd Year</option>
      <option>3rd Year</option>
      <option>4th Year</option>
    </select>
    <button onclick="registerStudent()">Confirm</button>
  </div>
</div>

<script>
const studentID = localStorage.getItem("studentID");
const program = localStorage.getItem("program");

document.getElementById("userInfo").innerText = `ID: ${studentID} | ${program}`;
document.getElementById("fixedID").value = studentID;
document.getElementById("fixedProg").value = program;

/* MODAL */
function openModal(id){
  document.getElementById(id).style.display='flex';
}

window.onclick = e=>{
  document.querySelectorAll('.modal').forEach(m=>{
    if(e.target===m) m.style.display='none';
  });
};

/* PROFILE */
function saveProfile(){
  localStorage.setItem("name", document.getElementById("fullName").value);
  alert("Profile saved!");
}

/* COURSES */
const coursesData={
  "Computer Science":["Algorithms","Data Structures","AI Basics"],
  "Information Technology":["Networking","Database Systems","Web Development"],
  "Entertainment and Multimedia Computing":["3D Animation","Game Design","Digital Arts"]
};

let selectedCourses=[];

function loadCourses(){
  const list = coursesData[program] || [];
  const container = document.getElementById("coursesContainer");

  container.innerHTML="";

  list.forEach(course=>{
    const div=document.createElement("div");
    div.className="course-item";
    div.innerText=course;

    div.onclick=()=>{
      div.classList.toggle("selected");

      if(selectedCourses.includes(course)){
        selectedCourses=selectedCourses.filter(c=>c!==course);
      } else {
        selectedCourses.push(course);
      }
    };

    container.appendChild(div);
  });
}

function saveCourses(){
  localStorage.setItem("courses", JSON.stringify(selectedCourses));
  displayCourses();
  alert("Enrolled successfully!");
}

function displayCourses(){
  const courses = JSON.parse(localStorage.getItem("courses") || "[]");
  const list = document.getElementById("courseList");

  if(courses.length===0){
    list.innerHTML="<p>No courses enrolled yet.</p>";
    return;
  }

  list.innerHTML = courses.map(c=>`<p>• ${c}</p>`).join("");
}

/* REGISTER */
function registerStudent(){
  document.getElementById("regStatus").innerText="Registered";
}

/* LOGOUT */
function logout(){
  localStorage.clear();
  window.location.href="login.html";
}

/* INIT */
loadCourses();
displayCourses();
</script>

</body>
</html>
