<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ScholarPortal Login</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins', sans-serif;
}

body{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:linear-gradient(135deg,#0a3d62,#1e5f9a);
}

.container{
  display:flex;
  width:90%;
  max-width:900px;
  background:#fff;
  border-radius:20px;
  overflow:hidden;
  box-shadow:0 10px 40px rgba(0,0,0,0.2);
}

.left{
  flex:1;
  background:linear-gradient(135deg,#0a3d62,#1e5f9a);
  color:#fff;
  padding:40px;
  display:flex;
  flex-direction:column;
  justify-content:center;
}

.left h1{
  font-size:32px;
}

.logo-container{
  display:flex;
  align-items:center;
  gap:15px;
  margin-bottom:15px;
}

.logo-container img{
  width:50px;
  height:50px;
  object-fit:contain;
}

.left p{
  opacity:0.8;
}

.right{
  flex:1;
  padding:40px;
}

.form-title{
  font-size:24px;
  margin-bottom:20px;
  color:#0a3d62;
  font-weight: bold;
}

.input-group{
  margin-bottom:15px;
}

.input-group label{
  font-size:14px;
  color:#333;
}

.input-group input,
.input-group select{
  width:100%;
  padding:10px;
  margin-top:5px;
  border-radius:10px;
  border:1px solid #ccc;
  outline:none;
  transition:0.3s;
}

.input-group input:focus,
.input-group select:focus{
  border-color:#1e5f9a;
  box-shadow:0 0 5px rgba(30,95,154,0.5);
}

.btn{
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  background:linear-gradient(135deg,#1e5f9a,#f1c40f);
  color:#fff;
  font-weight:600;
  cursor:pointer;
  transition:0.3s;
}

.btn:hover{
  transform:translateY(-2px);
  box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

.footer-text{
  margin-top:15px;
  font-size:12px;
  text-align:center;
  color:#777;
}

@media(max-width:768px){
  .container{
    flex-direction:column;
  }

  .left{
    text-align:center;
  }
}
</style>
</head>

<body>

<div class="container">

  <div class="left">
    <div class="logo-container">
      <img src="logo.png" alt="Logo">
      <h1>ScholarPortal</h1>
    </div>
    <p>Access your academic dashboard securely using your Student ID.</p>
  </div>

  <div class="right">
    <div class="form-title">Student Login</div>

    <form onsubmit="return loginUser(event)">

      <div class="input-group">
        <label>Student ID</label>
        <input type="text" id="studentID" required placeholder="Enter your Student ID">
      </div>

      <div class="input-group">
        <label>Password</label>
        <input type="password" id="password" required placeholder="Enter your password">
      </div>

      <div class="input-group">
        <label>Academic Program</label>
        <select id="program" required>
          <option value="">Select your program</option>
          <option>Entertainment and Multimedia Computing</option>
          <option>Computer Science</option>
          <option>Information Technology</option>
        </select>
      </div>

    <button class="btn" type="submit">Login</button>

    </form>

    <div class="footer-text">© 2026 ScholarPortal</div>
  </div>

</div>

<script>
function loginUser(e){
  e.preventDefault();

  const id = document.getElementById('studentID').value;
  const pass = document.getElementById('password').value;
  const prog = document.getElementById('program').value;

  if(id && pass && prog){
    // Save data for dashboard
    localStorage.setItem("studentID", id);
    localStorage.setItem("program", prog);

    // Redirect to dashboard
    window.location.href = "index.html";
  } else {
    alert("Please fill in all fields.");
  }
}

</script>

</body>
</html>
