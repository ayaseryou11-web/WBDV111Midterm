<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Login | VibeStream Pro</title>
	<link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>

<style>
* {
	margin: 0;
	padding: 0;
	box-sizing: border-box;
	font-family: "Poppins", sans-serif;
}

body {
	display: flex;
	justify-content: center;
	align-items: center;
	min-height: 100vh;
	background: url('background.png') center/cover no-repeat fixed;
	position: relative;
	color: #fff;
}

#bg-video {
	position: fixed;
	top: 0;
	left: 0;
	width: 100%;
	height: 100%;
	object-fit: cover;
	z-index: -2;
}

#video-overlay {
	position: fixed;
	top: 0;
	left: 0;
	width: 100%;
	height: 100%;
	background: rgba(0,0,0,0.4);
	z-index: -1;
}

.wrapper {
	width: 420px;
	background: rgba(0,0,0,0.3);
	border: 2px solid rgba(255, 255, 255, 0.2);
	backdrop-filter: blur(10px);
	color: #fff;
	border-radius: 12px;
	padding: 30px 40px;
	text-align: center;
}

.wrapper h1 {
	font-size: 36px;
	margin-bottom: 20px;
}

.wrapper .input-box {
	position: relative;
	width: 100%;
	height: 50px;
	margin: 20px 0;
}

.input-box input {
	width: 100%;
	height: 100%;
	background: transparent;
	border: 2px solid rgba(255, 255, 255, 0.2);
	border-radius: 40px;
	font-size: 16px;
	color: #fff;
	padding: 0 45px 0 20px;
}

.input-box input::placeholder {
	color: #fff;
}

.input-box i {
	position: absolute;
	right: 20px;
	top: 50%;
	transform: translateY(-50%);
	font-size: 20px;
	color: #fff;
}

.wrapper .remember-forgot {
	display: flex;
	justify-content: space-between;
	font-size: 14.5px;
	margin: -10px 0 15px;
}

.remember-forgot label input {
	accent-color: #fff;
	margin-right: 5px;
}

.remember-forgot a {
	color: #fff;
	text-decoration: none;
}

.remember-forgot a:hover {
	text-decoration: underline;
}

.wrapper .btn {
	width: 100%;
	height: 45px;
	background: #fff;
	border: none;
	outline: none;
	border-radius: 40px;
	box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
	cursor: pointer;
	font-size: 16px;
	color: #333;
	font-weight: 600;
	margin-top: 10px;
}

.wrapper .register-link {
	font-size: 14.5px;
	text-align: center;
	margin: 20px 0 15px;
}

.register-link p a {
	color: #fff;
	text-decoration: none;
	font-weight: 600;
}

.register-link p a:hover {
	text-decoration: underline;
}
</style>
</head>

<body>

	<!-- VIDEO BACKGROUND -->
	<video autoplay muted loop id="bg-video">
		<source src="disco.mp4" type="video/mp4">
	</video>
	<div id="video-overlay"></div>

	<!-- LOGIN WRAPPER -->
	<div class="wrapper">
		<form action="">
			<h1>Login to <b>VibeStream Pro</b></h1>

			<div class="input-box">
				<input type="text" placeholder="Username" required>
				<i class='bx bx-user-circle'></i>
			</div>

			<div class="input-box">
				<input type="password" placeholder="Password" required>
				<i class='bx bxs-lock'></i>
			</div>

			<div class="remember-forgot">
				<label><input type="checkbox"> Remember Me</label>
				<a href="#">Forgot Password</a>
			</div>

			<button type="submit" class="btn">Login</button>

			<div class="register-link">
				<p>Don't have an account? <a href="register.html">Register Now</a></p>
			</div>
		</form>
	</div>

</body>
</html>
