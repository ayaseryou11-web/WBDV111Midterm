<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Park Voyage | Map</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{
  background:linear-gradient(180deg,#ffffff 40%,#bff3ff 100%);
}

/* NAVBAR */
header{
  background:linear-gradient(90deg,#0a1f44,#123a7a);
  padding:15px 30px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  position:relative;
  z-index:1000;
}

/* LOGO */
.logo{
  display:flex;
  align-items:center;
  gap:10px;
}

.logo img{
  width:42px;
  height:42px;
  object-fit:contain;
}

.logo h1{
  color:#ffd700;
  font-size:1.4rem;
}

/* NAV LINKS (DESKTOP) */
nav{
  display:flex;
  align-items:center;
  gap:15px;
}

nav a{
    margin:0 10px;
    color:#fff;
    text-decoration:none;
    font-weight:500
}

nav a:hover{
    color:#ffd700;
    text-decoration: underline;
    transition: all 0.3s ease;
}

/* HAMBURGER (hidden on desktop) */
.menu-toggle{
  display:none;
  font-size:26px;
  color:#fff;
  cursor:pointer;
}

/* MOBILE NAV */
@media(max-width:768px){

  .menu-toggle{
    display:block;
    z-index:1100;
  }

  nav{
    position:fixed;
    top:0;
    right:-100%;
    width:260px;
    height:100vh;
    background:linear-gradient(180deg,#0a1f44,#123a7a);
    flex-direction:column;
    align-items:flex-start;
    padding-top:80px;
    transition:0.4s ease;
    z-index:1000;
  }

  nav a{
    width:100%;
    padding:15px 25px;
    border-bottom:1px solid rgba(255,255,255,0.1);
  }

  nav.active{
    right:0;
  }
}
/* HERO */
.hero{
  padding:120px 20px 80px;
  text-align:center;
  background:
    linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,2)),
    url('map1.jpg');
  background-size:cover;
  background-position:center;
  color:#fff;
}

/* HERO ENTRANCE */
.hero .section-badge,
.hero .section-title,
.hero .section-subtitle{
  opacity:0;
  transform:translateY(30px);
  animation:heroIn 0.9s ease forwards;
}

.hero .section-badge{ animation-delay:0.1s; }
.hero .section-title{ animation-delay:0.25s; }
.hero .section-subtitle{ animation-delay:0.4s; }

@keyframes heroIn{
  to{
    opacity:1;
    transform:translateY(0);
  }
}

/* Badge */
.section-badge{
  display:inline-block;
  padding:6px 14px;
  font-size:0.75rem;
  letter-spacing:2px;
  border-radius:50px;
  background:rgba(255,255,255,0.2);
  color:#fff;
  margin-bottom:15px;
  font-weight:600;
}

/* Title */
.section-title{
  font-size:clamp(2.2rem,5vw,3.5rem);
  font-weight:700;
  margin-bottom:10px;
}

.section-title span{
  background:linear-gradient(90deg,#ffd700,#ffb800);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

/* MAIN LAYOUT */
.app{
  width:95%;
  max-width:1400px;
  height:85vh;
  display:flex;
  gap:20px;
  margin: 60px auto 0;
}

/* MAP */
.map-wrapper{
  flex:2;
  background:#fff;
  border-radius:25px;
  padding:20px;
  box-shadow:0 20px 50px rgba(0,0,0,0.25);
  position:relative;
  overflow:hidden;
}

.map{
  width:100%;
  height:100%;
  border-radius:18px;
  object-fit:cover;
  transform-origin:center;
  transition:transform 0.9s cubic-bezier(0.2,0.8,0.2,1);
}

/* MARKERS */
.marker{
  position:absolute;
  width:38px;
  height:38px;
  border-radius:50%;
  transform:translate(-50%,-50%);
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  color:white;
  font-weight:bold;
  font-size:16px;
  box-shadow:0 10px 20px rgba(0,0,0,0.25);
  transition:0.2s ease;
}

.marker:hover{
  transform:translate(-50%,-50%) scale(1.2);
}

/* COLORS */
.hiraya{background:#0055ff;}
.diwata{background:#0aff80;}
.arayat{background:#ff1010;}
.banua{background:#b012fa;}
.heritage{background:#efef34;}

/* ACTIVE MARKER */
.active-marker{
  transform:translate(-50%,-50%) scale(1.4);
  box-shadow:0 0 18px rgba(255,255,255,0.9);
  border:2px solid white;
}

/* SIDEBAR */
.sidebar{
  flex:1;
  display:flex;
  flex-direction:column;
  gap:18px;
  opacity:0;
  transform:translateX(25px);
  transition:0.6s ease;
}

.sidebar.show{
  opacity:1;
  transform:translateX(0);
}

/* CARD */
.card{
  background:rgba(255,255,255,0.9);
  backdrop-filter:blur(15px);
  border-radius:20px;
  padding:20px;
  box-shadow:0 15px 30px rgba(0,0,0,0.2);
}

/* SIDEBAR TITLE */
.card h2{
  font-size:18px;
  font-weight:700;
  color:#0a1f44;
  margin-bottom:10px;
}

/* REGION NAME */
#regionName{
  color:#123a7a;
  font-weight:700;
}

/* IMAGE */
#regionImage{
  width:100%;
  height:160px;
  object-fit:cover;
  border-radius:12px;
  margin:10px 0;
  box-shadow:0 10px 20px rgba(0,0,0,0.15);

  display:none; /* important */
}

/* ATTRACTIONS */
#attractionsList{
  list-style:none;
  padding:0;
  margin-top:10px;
}

#attractionsList li{
  padding:10px;
  margin-bottom:6px;
  background:rgba(18,58,122,0.06);
  border-left:4px solid #123a7a;
  border-radius:8px;
  font-size:13px;
  color:#1c1c1c;
  transition:0.2s;
}

#attractionsList li:hover{
  transform:translateX(5px);
  background:rgba(237,207,11,0.2);
}

/* TIP */
.tip{
  background: linear-gradient(135deg, rgba(230, 138, 9, 0.9), rgb(255, 238, 3));
  color: white;
  backdrop-filter: blur(10px);
  border: 1px solid rgba(255,255,255,0.2);
}

.tip h3{
  font-size:16px;
  font-weight:700;
}

.tip p{
  font-size:13px;
  line-height:1.6;
  opacity:0.9;
}

/* FOOTER */
footer{
  text-align:center;
  padding:20px;
  background:#123a7a;
  color:#fff;
  margin-top:40px;
}

.reset-btn {
    position: absolute;
    top: 15px;
    right: 15px;
    z-index: 10;

    padding: 10px 14px;
    border: none;
    border-radius: 10px;

    background: #123a7a;
    color: white;
    font-weight: 600;
    cursor: pointer;

    box-shadow: 0 8px 20px rgba(0,0,0,0.2);
    transition: 0.2s ease;
}

.reset-btn:hover {
    transform: scale(1.05);
    background: #0a1f44;
}

/* MOBILE NAV */
@media(max-width:768px){

  .menu-toggle{
    display:block;
    z-index:1001;
  }

  nav{
    position:fixed;
    top:0;
    right:-100%; /* hidden off-screen */
    width:260px;
    height:100vh;
    background:linear-gradient(180deg,#0a1f44,#123a7a);
    display:flex;
    flex-direction:column;
    align-items:flex-start;
    padding-top:80px;
    transition:0.4s ease;
    z-index:1000;
    box-shadow:-10px 0 30px rgba(0,0,0,0.3);
  }

  nav a{
    width:100%;
    padding:15px 25px;
    border-bottom:1px solid rgba(255,255,255,0.1);
  }

  /* ACTIVE STATE (slides in) */
  nav.active{
    right:0;
  }
}

.logo img{
  width:42px;
  height:42px;
  object-fit:contain;

  filter:
    drop-shadow(0 0 4px rgba(255,215,0,0.6))
    drop-shadow(0 0 8px rgba(255,184,0,0.4));

  transition:0.3s ease;
}

.logo h1{
  font-size:1.5rem;
  color:#ffd700;

  text-shadow:
    0 0 4px rgba(255,215,0,0.6),
    0 0 8px rgba(255,184,0,0.4);

  transition:0.3s ease;
}

.logo:hover img{
  filter:
    drop-shadow(0 0 6px rgba(255,215,0,0.7))
    drop-shadow(0 0 12px rgba(255,184,0,0.5));
}

.logo:hover h1{
  text-shadow:
    0 0 6px rgba(255,215,0,0.7),
    0 0 12px rgba(255,184,0,0.5);
}

@media(max-width:768px){
  .logo h1{
    font-size:1.2rem;
  }

  .logo img{
    width:32px;
    height:32px;
  }
}

.reveal{
  opacity:0;
  transform:translateY(50px) scale(0.97);
  transition:all 0.8s cubic-bezier(0.2,0.8,0.2,1);
  will-change:transform, opacity;
}

.reveal.active{
  opacity:1;
  transform:translateY(0) scale(1);
}

.overlay{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.5);
  opacity:0;
  visibility:hidden;
  transition:0.3s ease;
  z-index:999;
}

.overlay.active{
  opacity:1;
  visibility:visible;
}
</style>
</head>

<body>

<div class="overlay" onclick="toggleMenu()"></div>

<header>
<div class="logo">
  <img src="logo.png" alt="Logo">
  <h1>Park Voyage</h1>
</div>
<div class="menu-toggle" onclick="toggleMenu()">
  ☰
</div>
<nav id="navMenu">
<a href="index.html">Home</a>
<a href="rides.html">Attractions</a>
<a href="dining.html">Dining</a>
<a href="map.html">Map</a>
<a href="tickets.html">Tickets</a>
<a href="contact.html">Contact</a>
<a href="login.html">Login/Sign-Up</a>
</nav>
</header>

<section class="hero">
  <div class="section-badge">MAP EXPLORARION</div>

  <h2 class="section-title">
    Navigate <span>Your Way</span>
  </h2>

  <p class="section-subtitle">
    Find your way around Pradera Islands!
  </p>
</section>

<div class="app">

  <!-- MAP -->
<div class="map-wrapper reveal">
    <button class="reset-btn" onclick="resetMap()">Reset View</button>
    <img src="map.jpg" class="map">

    <div class="marker hiraya" data-region="hiraya" style="top:55%; left:40%;">📍</div>
    <div class="marker diwata" data-region="diwata" style="top:35%; left:21%;">📍</div>
    <div class="marker arayat" data-region="arayat" style="top:20%; left:60%;">📍</div>
    <div class="marker banua" data-region="banua" style="top:65%; left:80%;">📍</div>
    <div class="marker heritage" data-region="heritage" style="top:80%; left:45%;">📍</div>

  </div>

  <!-- SIDEBAR -->
  <div class="sidebar reveal" id="sidebar">

    <div class="card">
      <h2>📍 <span id="regionName">Click a marker</span></h2>

    <img id="regionImage" style="display:none;">

      <ul id="attractionsList">
        <li>Select a region</li>
      </ul>
    </div>

    <div class="card tip">
      <h3>✨ Pro Tip!</h3>
      <p>Click a marker to explore attractions and details.</p>
    </div>

  </div>

</div>

<footer>
  © 2026 Park Voyage
</footer>

<script>
const markers = document.querySelectorAll(".marker");
const map = document.querySelector(".map");
const sidebar = document.getElementById("sidebar");
const regionName = document.getElementById("regionName");
const regionImage = document.getElementById("regionImage");
const attractionsList = document.getElementById("attractionsList");

let activeMarker = null;

const regionData = {
  hiraya: {
    name: "Hiraya Lake",
    image: "hira.jpg",
    attractions: ["Sirena Splash", "Lago Launcher", "Malyari Galleon", "Hiraya Hopper", "Lago Verde Cruises", "Lago Heroes", "Battle of Lago Verde"]
  },
  diwata: {
    name: "Diwata Forest",
    image: "diwa.jpg",
    attractions: ["Pepito Rush", "Tree of Life", "Diwata Towers", "Secret of Arayat"]
  },
  arayat: {
    name: "Arayat Town",
    image: "ara.jpg",
    attractions: ["Firestorm Gliders", "Naga Brigade", "Duyan", "Battle Bumpers", "Bahay ni Aling Pasya"]
  },
  banua: {
    name: "Banua Portal",
    image: "ban.jpg",
    attractions: ["Space Force", "Turbulence", "Galura Flyer", "Bambalito’s Hide Out", "Banua Shuttle", "Star Seeker Safari"]
  },
  heritage: {
    name: "Heritage Zone",
    image: "heri.jpg",
    attractions: ["Information Center", "Souvenir Center", "ZUS Coffee", "Kusina ni Nanay"]
  }
};

markers.forEach(marker=>{
  marker.addEventListener("click",()=>{

    const key = marker.dataset.region;
    const data = regionData[key];
    if(!data) return;

    /* active marker */
    if(activeMarker) activeMarker.classList.remove("active-marker");
    marker.classList.add("active-marker");
    activeMarker = marker;

    /* sidebar */
    sidebar.classList.add("show");

    regionName.textContent = data.name;
    regionImage.src = data.image;
    regionImage.style.display = "block";

    attractionsList.innerHTML = "";
    data.attractions.forEach(a=>{
      const li = document.createElement("li");
      li.textContent = a;
      attractionsList.appendChild(li);
    });

    /* FIXED CAMERA ZOOM (stable version) */
    const x = parseFloat(marker.style.left);
    const y = parseFloat(marker.style.top);

    map.style.transform = `
      translate(${(50 - x) * 0.6}%, ${(50 - y) * 0.6}%)
      scale(1.8)
    `;
  });
});

function resetMap() {

  /* reset zoom + position */
  map.style.transform = "translate(0%, 0%) scale(1)";

  /* remove active marker */
  if (activeMarker) {
    activeMarker.classList.remove("active-marker");
    activeMarker = null;
  }

  /* reset sidebar */
  regionName.textContent = "Click a marker";
  regionImage.style.display = "none";
  regionImage.src = "";

  attractionsList.innerHTML = `
    <li>Select a region to view attractions</li>
  `;

  function setMapFocus(x, y) {
  map.style.transform = `
    translate(${(50 - x) * 0.8}%, ${(50 - y) * 0.8}%)
    scale(1.8)
  `;
}
}

window.addEventListener("load", () => {
  document.querySelectorAll(".reveal").forEach((el, i) => {
    setTimeout(() => {
      el.classList.add("active");
    }, i * 150);
  });
});

function toggleMenu() {
  const nav = document.getElementById("navMenu");
  const overlay = document.querySelector(".overlay");
  const toggle = document.querySelector(".menu-toggle");

  nav.classList.toggle("active");
  overlay.classList.toggle("active");

  const isOpen = nav.classList.contains("active");

  toggle.textContent = isOpen ? "✕" : "☰";

  document.body.style.overflow = isOpen ? "hidden" : "auto";
}

document.querySelectorAll("nav a").forEach(link => {
  link.addEventListener("click", toggleMenu);
});
</script>

</body>
</html>
