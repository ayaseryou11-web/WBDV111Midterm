<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Login | Luna Vista Resort</title>
	<link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
	<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{
	margin: 0;
	padding: 0;
	box-sizing: border-box;
	font-family: "Poppins", sans-serif;
}

body{
	display: flex;
	justify-content: center;
	align-items: center;
	min-height: 100vh;
	background: url('beach1.jpg') center/cover no-repeat fixed;
	position: relative;
	color: #fff;
}

.topbar {
	position: fixed;
	top: 0;
	left: 0;
	width: 100%;
	display: flex;
	align-items: center;
	justify-content: space-between;
	padding: 1rem clamp(1rem, 3vw, 3rem);
	z-index: 20;
	background: linear-gradient(rgba(2, 18, 30, 0.8), rgba(2, 18, 30, 0));
	color: #ffffff;
	border-radius: 12px;
}

.brand {
	color: #fff;
	text-decoration: none;
	font-weight: 800;
	font-size: clamp(1rem, 2.2vw, 1.35rem);
	letter-spacing: 0.04em;
	padding-left: 20px;
}

.menu {
	list-style: none;
	display: flex;
	gap: clamp(0.6rem, 1.6vw, 1.4rem);
	padding-right: 20px;
}

.menu a {
	color: #dff2fb;
	text-decoration: none;
	font-weight: 600;
	font-size: 0.95rem;
}

.menu a:hover {
	color: #fff;
}

.wrapper{
	width: 420px;
	background: rgba(0,0,0,0.3);
	border: 2px solid rgba(255, 255, 255, 0.2);
	backdrop-filter: blur(10px);
	color: #fff;
	border-radius: 12px;
	padding: 30px 40px;
	text-align: center;
}

.wrapper h1{
	font-size: 36px;
	margin-bottom: 20px;
}

.wrapper .input-box{
	position: relative;
	width: 100%;
	height: 50px;
	margin: 30px 0;
}

.input-box input{
	width: 100%;
	height: 100%;
	background: transparent;
	border: none;
	outline: none;
	border: 2px solid rgba(255, 255, 255, 0.2);
	border-radius: 40px;
	font-size: 16px;
	color: #fff;
	padding: 20px 45px 20px 20px;
}

.input-box input::placeholder{
	color: #fff;
}

.input-box i{
	position: absolute;
	right: 20px;
	top: 50%;
	transform: translateY(-50%);
	font-size: 20px;
	color: #fff;
}

.wrapper .remember-forgot{
	display: flex;
	justify-content: space-between;
	font-size: 14.5px;
	margin: -15px 0 15px;
}

.remember-forgot label input{
	accent-color: #fff;
	margin-right: 3px;
}

.remember-forgot a{
	color: #fff;
	text-decoration: none;
}

.remember-forgot a:hover{
	text-decoration: underline;
}

.wrapper .btn{
	width: 100%;
	height: 45px;
	background: #fff;
	border: none;
	outline: none;
	border-radius: 40px;
	box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
	cursor: pointer;
	font-size: 16px;
	color: #333;
	font-weight: 600;
}

.wrapper .register-link{
	font-size: 14.5px;
	text-align: center;
	margin: 20px 0 15px;
}

.register-link p a{
	color: #fff;
	text-decoration: none;
	font-weight: 600;
}

.register-link p a:hover{
	text-decoration: underline;
}

</style>
</head>

<body>

	<header class="topbar">
		<a class="brand" href="home.html">Luna Vista Resort</a>
		<nav aria-label="Primary">
			<ul class="menu">
				<li><a href="index.html">Home</a></li>
				<li><a href="gallery.html">Gallery</a></li>
				<li><a href="booking.html">Reservations</a></li>
				<li><a href="register.html">Sign Up</a></li>
			</ul>
		</nav>
	</header>

	<div class="wrapper">
		<form action="">
			<h1>Login to <b>Luna Vista Resort</b></h1>

			<div class="input-box">
				<input type="text" placeholder="Username" required>
				<i class='bx bx-user-circle'></i>
			</div>

			<div class="input-box">
				<input type="password" placeholder="Password" required>
				<i class='bx bxs-lock'></i>
			</div>

			<div class="remember-forgot">
				<label><input type="checkbox"> Remember Me</label>
				<a href="#">Forgot Password</a>
			</div>

			<button type="submit" class="btn">Login</button>

			<div class="register-link">
				<p>Don't have an account? <a href="register.html">Register Now</a></p>
			</div>
		</form>
	</div>

</body>
</html>
