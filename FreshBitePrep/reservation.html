<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta http-equiv="X-UA-Compatible" content="IE=edge">
	<meta name="viewport" 
	content="width=device-width, 
	initial-scale=1.0">
	<title>Reservation Form | FreshBite Prep </title>
	<link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
	<link href="https://fonts.googleapis.com" rel="stylesheet">
	
<style>
*{
	margin: 0;
	padding: 0;
	box-sizing: border-box;
	font-family: "Poppins", sans-serif;
}

#bg-video {
	position: fixed;
	top: 0;
	left: 0;
	min-width: 100%;
	min-height: 100%;
	z-index: -1;
	object-fit: cover;
    filter: blur(10px);
    transform: scale(1.05);
}
body{
	display: flex;
	justify-content: center;
	align-items: center;
	min-height: 100vh;
}

.topbar {
	position: fixed;
	inset: 0 0 auto 0;
	display: flex;
	align-items: center;
	justify-content: space-between;
	padding: 1rem clamp (1rem, 3vw, 3rem);
	z-index: 20;
	background: linear-gradient (rgba(2, 18, 30, 0.8), rgba(2, 18, 30, 0));
	color: #ffffff;
	border-radius: 12px;
}

.static-topbar {
	position: sticky;
	background: #052436;
}

.brand {
	color: var(--sand);
	text-decoration: none;
	font-weight: 1000;
	font-size: clamp(1rem, 2.2vw, 1.35rem);
	letter-spacing: 0.04em;
	padding-left: 20px;
	padding-top: 20px;
}

.menu {
	list-style: none;
	font-size: 30px;
	margin: 0;
	padding-right: 20px;
	padding-top: 20px;
	display: flex;
	gap: clamp(0.6rem, 1.6vw, 1.4rem);
}

.menu a {
	color: #F7EFED;
	text-decoration: none;
	font-weight: 600;
	font-size: 1.20rem;
	letter-spacing: 0.03em;
}

.menu a:hover {
	color: orange;
    transition: 0.3s linear;
}


.wrapper{
	width: 420px;
	background: transparent;
	border: 2px solid rgba(255, 255, 255, .2);
	backdrop-filter: blur(20px);
	color: #fff;
	border-radius: 12px;
	padding: 30px 40px;
}
.wrapper h1 {
	font-size: 36px;
	text-align: center;
}
.input-box {
    position: relative;
    width: 100%;
    margin: 20px 0;
}

.input-box input {
    width: 100%;
    height: 50px;
    background: #924D3F;
    border: 2px solid rgba(255,255,255,.2);
    outline: none;
    border-radius: 40px;
    font-size: 16px;
    color: #fff;
    padding: 0 20px 0 45px;
}

.input-box input::placeholder {
    color: #fff;
}

.input-box i {
    position: absolute;
    left: 15px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 20px;
    color: #fff;
}

.wrapper label {
	font-size: 14.5px;
	margin: 10px 0 23px;
	display: inline-block;
}

.wrapper label input {
	accent-color: #fff;
	margin-right: 5px;
}

.wrapper .btn {
	width: 100%;
	height: 45px;
	background: #fff;
	border: none;
	outline: none;
	border-radius: 6px;
	box-shadow: 0 0 10px rgba(0, 0, 0, -1);
	cursor: pointer;
	font-size: 16px;
	color: #333;
	font-weight: 600;
}

.btn:hover {
    background-color: orange;
    transition: 0.3s linear;
    color: #fff;
}

input[type="date"]::-webkit-calendar-picker-indicator {
    position: absolute;
    left: 15px;
    right: auto;
    cursor: pointer;
    opacity: 0;
    display: none;
}

.input-box input[type="date"]{
    position: relative;
    padding-left: 45px;
}

input[type="time"]::-webkit-calendar-picker-indicator {
    display: none;
    -webkit-appearance: none; 
    opacity: 0; 
    cursor: pointer;
}


@media (max-width: 576px) {
	.input-box .input-field {
		width: 100%;
	}
}

	
	</style>
</head>

<body>

	<video autoplay muted loop id="bg-video">
		<source src="video.mp4" type="video/mp4">
	</video>
	
	<header class="topbar">
		<a class="brand" href="index.html">FreshBite Prep</a>
		<nav aria-label="Primary">
			<ul class="menu">
								
					<li>
						<a href="index.html"> Home </a>
					</li>
					
					<li>
						<a href="Menu.html"> Menu </a>
					</li>
					
					<li>
						<a href="register.html"> Sign Up </a>
					</li>
			</ul>
			</nav>
		</header>
	
	<div class="wrapper">
		<form action=" ">
			<h1>Book Your Table</h1>
			
			<div class="input-box">
				<div class="input-field">
					<input type="text" placeholder="Full Name" required>
					<i class='bx bxs-user'></i>
			</div>
		</div>
		
		<div class="input-box">
    <div class="input-field">
        <input type="email" placeholder="Email" required>
        <i class='bx bxs-envelope'></i>
    </div>
</div>

<div class="input-box">
    <div class="input-field">
        <input type="number" placeholder="Phone Number" required>
        <i class='bx bxs-phone'></i>
    </div>
</div>

<div class="input-box">
  <div class="input-field" style="position: relative;">
    <input type="date" id="dateInput" placeholder="MM/DD/YYYY" required>
    <i class='bx bxs-calendar' id="calendarIcon" style="position: absolute; left: 10px; top: 50%; transform: translateY(-50%); cursor: pointer; color: #fff; font-size: 20px;"></i>
  </div>
</div>

  <div class="input-box">
  <div class="input-field" style="position: relative;">
    <input type="time" id="timeInput" required>
    <i class='bx bxs-time' style="position: absolute; left: 10px; top: 50%; transform: translateY(-50%); cursor: pointer; color: #fff; font-size: 20px;"></i>
  </div>
</div>

			<button type="submit" class="btn">Book Now</button>
		</form>
	</div>


<script>
  const dateInput = document.getElementById('dateInput');
  const calendarIcon = document.getElementById('calendarIcon');

  calendarIcon.addEventListener('click', () => {
    dateInput.showPicker?.()  
    || dateInput.focus();  
  });

  const timeInput = document.getElementById('timeInput');
const clockIcon = document.querySelector(".bxs-time");

clockIcon.addEventListener("click", () => {
  if (timeInput.showPicker) {
    timeInput.showPicker();
  } else {
    timeInput.focus();
  }
});

</script>

</body>
</html>
