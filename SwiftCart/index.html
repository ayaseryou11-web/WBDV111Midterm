<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SwiftCart</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    font-family: 'Press Start 2P', cursive; /* Pixel-style font */
    background: url('background.png') no-repeat center center fixed;
    background-size: cover;
    color: #fff;
}

header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 1rem 2rem;
    background: rgba(0,0,0,0.7);
    position: fixed;
    top: 0; width: 100%; z-index: 10;
}
header img { height: 50px; }
/* Navigation bar */
nav {
  display: flex;
  gap: 1rem;
  align-items: center;
}

/* Pixel-style buttons */
nav button,
nav a.nav-btn {
  background: #3c8d0d; /* Stardew green */
  border: 3px solid #fff;
  padding: 0.5rem 1rem;
  cursor: pointer;
  color: #fff;
  font-family: 'Press Start 2P', cursive;
  border-radius: 6px;
  image-rendering: pixelated;
  transition: transform 0.2s ease, background 0.3s ease;
  text-decoration: none; /* removes underline from links */
  display: inline-block; /* makes <a> behave like a button */
}

nav button:hover,
nav a.nav-btn:hover {
  transform: scale(1.1);
  background: #5cbf2a;
  box-shadow: 0 0 8px #ffd700;
}


/* Search bar */
nav input[type="text"] {
  padding: 0.5rem;
  border: 3px solid #fff;
  border-radius: 6px;
  background: rgba(255,255,255,0.2);
  color: #fff;
  font-family: 'Press Start 2P', cursive;
  width: 200px;
  transition: width 0.3s ease, background 0.3s ease;
}

nav input[type="text"]:focus {
  width: 300px; /* expands when typing */
  background: rgba(255,255,255,0.4);
  outline: none;
  box-shadow: 0 0 8px #ffd700;
}

main {
    display: flex;
    margin-top: 100px;
    padding: 2rem;
}

/* Category bar */
.category-bar {
  display: flex;
  justify-content: center;
  gap: 1rem;
  padding: 0.8rem;
  background: rgba(0,0,0,0.6);
  border-bottom: 3px solid #ffd700;
  position: sticky;
  top: 70px; /* sits just below header */
  z-index: 9;
  padding-top: 20px;
}

.category-bar button {
  background: #2e86c1; /* Stardew blue */
  border: 3px solid #fff;
  padding: 0.5rem 1rem;
  cursor: pointer;
  color: #fff;
  font-family: 'Press Start 2P', cursive;
  border-radius: 6px;
  image-rendering: pixelated;
  transition: transform 0.2s ease, background 0.3s ease;
}

.category-bar button:hover {
  transform: scale(1.1);
  background: #5dade2;
  box-shadow: 0 0 8px #ffd700;
}


/* Product showcase */
.products {
    flex: 3;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 1rem;
}
.product {
    background: rgba(0,0,0,0.6);
    padding: 1rem;
    border-radius: 8px;
    text-align: center;
    transition: transform 0.3s ease;
}
.product:hover { transform: translateY(-5px); }
.product img { width: 100%; height: auto; }
.product h3 { margin: 0.5rem 0; }
.product p { margin: 0.5rem 0; }
.product button {
    background: #ff9800;
    border: none;
    padding: 0.5rem;
    cursor: pointer;
    color: #fff;
    font-family: inherit;
    transition: background 0.3s ease;
}
.product button:hover { background: #f57c00; }
    /* Keep pixel crispness */
.product img {
  width: 120px;
  height: 120px;
  image-rendering: pixelated; /* preserves retro pixel look */
  transition: transform 0.3s ease, filter 0.3s ease;
}

/* Bounce effect on hover */
.product img:hover {
  transform: translateY(-8px) scale(1.1);
  filter: drop-shadow(0 0 6px #ffd700); /* glowing golden aura */
}

/* Optional shimmer animation */
@keyframes shimmer {
  0% { filter: drop-shadow(0 0 4px #ffd700); }
  50% { filter: drop-shadow(0 0 10px #ff69b4); }
  100% { filter: drop-shadow(0 0 4px #ffd700); }
}

.product img:hover {
  animation: shimmer 1s infinite;
}

 /* Sidebar styling */
.sidebar {
  flex: 1;
  background: rgba(0,0,0,0.85);
  padding: 1rem;
  border-radius: 12px;
  margin-left: 1rem;
  display: flex;
  flex-direction: column;
  gap: 1rem;
  font-size: 0.9rem;
  border: 3px solid #ffd700; /* golden pixel border */
  image-rendering: pixelated;
}

/* Section headers */
.sidebar h2 {
  font-size: 1rem;
  margin-bottom: 0.5rem;
  color: #ffd700;
  text-shadow: 2px 2px #000;
  border-bottom: 2px dashed #ffd700;
  padding-bottom: 0.3rem;
}

/* Cart items */
.cart-item {
  background: rgba(255,255,255,0.1);
  padding: 0.5rem;
  margin-bottom: 0.5rem;
  border-radius: 6px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  transition: transform 0.2s ease;
}
.cart-item:hover {
  transform: scale(1.05);
  background: rgba(255,255,255,0.2);
}

/* Remove button */
.cart-item button {
  background: #e53935;
  border: none;
  color: #fff;
  padding: 0.3rem 0.5rem;
  cursor: pointer;
  font-family: inherit;
  border-radius: 4px;
}
.cart-item button:hover {
  background: #b71c1c;
}

/* Order status box */
#status {
  background: rgba(255,255,255,0.1);
  padding: 0.7rem;
  border-radius: 6px;
  text-align: center;
  font-weight: bold;
  color: #81c784;
  border: 2px solid #81c784;
}

#checkout-form {
  display: flex;
  flex-direction: column;
  gap: 0.5rem;
}

#checkout-form label {
  font-size: 0.8rem;
  color: #ffd700;
}

#checkout-form input, 
#checkout-form textarea {
  padding: 0.5rem;
  border: 2px solid #fff;
  border-radius: 6px;
  background: rgba(255,255,255,0.1);
  color: #fff;
  font-family: 'Press Start 2P', cursive;
}

.checkout-btn {
  margin-top: 1rem;
  background: #3c8d0d;
  border: 3px solid #fff;
  padding: 0.7rem;
  cursor: pointer;
  color: #fff;
  font-family: 'Press Start 2P', cursive;
  border-radius: 6px;
  transition: transform 0.2s ease, background 0.3s ease;
}

.checkout-btn:hover {
  transform: scale(1.05);
  background: #5cbf2a;
  box-shadow: 0 0 8px #ffd700;
}


footer {
  background: rgba(0,0,0,0.8);
  text-align: center;
  padding: 1rem;
  position: fixed;
  bottom: 0; width: 100%;
  font-size: 0.8rem;
}

    @media (max-width: 768px) {
      main { flex-direction: column; }
      .sidebar { margin-left: 0; margin-top: 1rem; }
    }
  </style>
</head>
<body>
  <!-- Header -->
  <header>
    <img src="logo.png" alt="SwiftCart Logo">
    <nav>
    <input type="text" placeholder="Search...">
   <button onclick="document.getElementById('catalog').scrollIntoView({behavior: 'smooth'});">
    Catalog
    </button>
 <button onclick="document.getElementById('status').scrollIntoView({behavior: 'smooth'});">
    Status
    </button>
    <a href="login.html" class="nav-btn">Login</a>
    <a href="adminlogin.html" class="nav-btn">Admin</a>
    </nav>
  </header>

  <!-- Category Filter Bar -->
<div class="category-bar">
  <button onclick="filterCategory('All')">All</button>
  <button onclick="filterCategory('Seeds')">Seeds</button>
  <button onclick="filterCategory('Stars')">Stars</button>
  <button onclick="filterCategory('Misc')">Misc</button>
</div>


  <!-- Main content -->
  <main>
<!-- Products -->

<section class="products" id="catalog">
  <div class="product" data-category="Seeds">
    <img src="seed1.png" alt="Seed">
    <h3>Seed</h3>
    <p>$5</p>
    <button onclick="addToCart('Seed', 5)">Add to Cart</button>
  </div>
  <div class="product" data-category="Seeds">
    <img src="seed2.png" alt="Seed">
    <h3>Also a Seed</h3>
    <p>$3</p>
    <button onclick="addToCart('Also a Seed', 3)">Add to Cart</button>
  </div>
  <div class="product" data-category="Stars">
    <img src="star1.png" alt="Star">
    <h3>Star</h3>
    <p>$7</p>
    <button onclick="addToCart('Star', 7)">Add to Cart</button>
  </div>
  <div class="product" data-category="Stars">
    <img src="star2.png" alt="Star Purple">
    <h3>Star but Purple</h3>
    <p>$7</p>
    <button onclick="addToCart('Star but Purple', 7)">Add to Cart</button>
  </div>
  <div class="product" data-category="Stars">
    <img src="star3.png" alt="Star Grey">
    <h3>Star but Grey</h3>
    <p>$7</p>
    <button onclick="addToCart('Star but Grey', 7)">Add to Cart</button>
  </div>
  <div class="product" data-category="Misc">
    <img src="chest.png" alt="Chest">
    <h3>Chest</h3>
    <p>$7</p>
    <button onclick="addToCart('Chest', 7)">Add to Cart</button>
  </div>
  <div class="product" data-category="Misc">
    <img src="totem.png" alt="Totem">
    <h3>Totem</h3>
    <p>$7</p>
    <button onclick="addToCart('Totem', 7)">Add to Cart</button>
  </div>
</section>

    <!-- Sidebar -->
<aside class="sidebar">
  <h2>🛒 Cart Items</h2>
  <div id="cart"></div>

  <h2>📦 Order Status</h2>
  <p id="status">No orders yet.</p>

  <h2>💰 Total</h2>
  <p id="total">$0</p>

  <!-- Checkout Form -->
  <h2>🚚 Checkout</h2>
  <form id="checkout-form" onsubmit="submitOrder(event)">
    <label for="name">Full Name:</label>
    <input type="text" id="name" required>

    <label for="address">Delivery Address:</label>
    <textarea id="address" required></textarea>

    <label for="phone">Phone Number:</label>
    <input type="tel" id="phone" required>

    <label for="email">Email:</label>
    <input type="email" id="email" required>

    <button type="submit" class="checkout-btn">Place Order</button>
  </form>
</aside>


  </main>

  <!-- Footer -->
  <footer>
    © 2026 SwiftCart
  </footer>

  <!-- Interactivity -->
  <script>
    const cart = [];
    function addToCart(name, price) {
      cart.push({name, price});
      renderCart();
      document.getElementById('status').innerText = "Order in progress...";
    }
    function renderCart() {
      const cartDiv = document.getElementById('cart');
      cartDiv.innerHTML = '';
      cart.forEach(item => {
        const div = document.createElement('div');
        div.className = 'cart-item';
        div.innerText = `${item.name} - $${item.price}`;
        cartDiv.appendChild(div);
      });
    }

    // Search functionality
const searchInput = document.querySelector('nav input[type="text"]');
searchInput.addEventListener('input', () => {
  const query = searchInput.value.toLowerCase();
  document.querySelectorAll('.product').forEach(product => {
    const name = product.querySelector('h3').innerText.toLowerCase();
    product.style.display = name.includes(query) ? 'block' : 'none';
  });
});

// Category filter
function filterCategory(category) {
  document.querySelectorAll('.product').forEach(product => {
    if (category === 'All' || product.dataset.category === category) {
      product.style.display = 'block';
    } else {
      product.style.display = 'none';
    }
  });
}

function submitOrder(event) {
  event.preventDefault();

  const name = document.getElementById('name').value;
  const address = document.getElementById('address').value;
  const phone = document.getElementById('phone').value;
  const email = document.getElementById('email').value;

  if (cart.length === 0) {
    alert("Your cart is empty!");
    return;
  }

  // Simulate order submission
  document.getElementById('status').innerText = "Order placed! Preparing for delivery...";
  alert(`Thank you, ${name}! Your order will be delivered to:\n${address}\nWe’ll contact you at ${phone} or ${email}.`);

  // Clear cart after checkout
  cart.length = 0;
  renderCart();
  document.getElementById('total').innerText = "$0";
  document.getElementById('checkout-form').reset();
}


  </script>
</body>
</html>
