<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Luna Vista Resort - Gallery</title>

<link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">

<style>
:root {
  --primary-color: #2c3855;
  --white: #ffffff;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Poppins', sans-serif;
}

body {
  background-image: url('beach.png') no-repeat;
  background-size: cover;
  background-position: center;
  background-attachment: fixed;
  display: flex;
  flex-direction: column;
  min-height: 100vh;
}

body::before {
  content: "";
  position: fixed;
  top: 0; left: 0;
  width: 100%;
  height: 100%;
  background-image: url('beach.png');
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
  filter: blur(8px);       /* adjust the blur intensity */
  z-index: -1;              /* behind all content */
}

/* NAVIGATION */
nav {
  position: fixed;
  top: 0;
  width: 100%;
  background: var(--white);
  z-index: 1000;
  border-bottom: 1px solid #e5e7eb;
}

.nav__container {
  max-width: 1200px;
  margin: auto;
  padding: 1rem 1.5rem;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.nav__logo img {
  height: 60px;
}

.nav__links {
  list-style: none;
  display: flex;
  gap: 2rem;
}

.nav__links a {
  text-decoration: none;
  color: #767268;
  font-weight: 500;
}

.nav__links a:hover {
  color: var(--primary-color);
  text-decoration: underline;
  transition: 0.3s linear;
}


/* CAROUSEL */
.carousel-container {
  margin-top: 10px; /* space from nav */
  max-width: 1200px;
  margin-bottom: 40px;
  margin-left: auto;
  margin-right: auto;
  position: relative;
  overflow: hidden;
  border-radius: 10px;
  height: 600px;
  box-shadow: 0 5px 25px rgba(0,0,0,0.2);
}

.slides {
  display: flex;         /* already correct */
  width: 100%;
  height: 100%;
  transition: transform 1s ease-in-out;
}

.slide img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}
.slide {
  min-width: 100%;       /* each slide takes full container width */
  height: 100%;
  flex-shrink: 0;        /* prevent shrinking */
  background-size: cover;  /* show background-image fully */
  background-position: center;
  position: relative;      /* needed for captions */
}

.slide-caption {
  position: absolute;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%);
  color: #fff;
  font-size: 3rem;
  font-weight: 600;
  text-shadow: 1px 1px 10px rgba(0,0,0,0.7);
  letter-spacing: 0.5px;
  text-align: center;
  max-width: 80%;
  background: rgba(0, 0, 0, 0.5); /* semi-transparent black */
  padding: 12px 20px;
  border-radius: 10px;
  /* Transition for smooth fade */
  opacity: 0;
  transition: opacity 1s ease-in-out;
}

.slide.active .slide-caption {
  opacity: 1;
  transform: translateX(-50%);
}

.page-title {
  margin-top: 120px; /* space from fixed nav */
  text-align: center;
  font-size: 2.5rem;
  font-weight: 600;
  color: #fff;
  margin-bottom: 20px; /* space between title and carousel */
}

/* Carousel arrows */
.carousel-nav {
  position: absolute;
  top: 50%;
  width: 100%;
  display: flex;
  justify-content: space-between;
  transform: translateY(-50%);
  padding: 0 20px;
  z-index: 10;
}

.carousel-nav span {
  cursor: pointer;
  font-size: 2.5rem;
  color: #fff;
  background: rgba(0,0,0,0.4);
  padding: 12px;
  border-radius: 50%;
  user-select: none;
  transition: background 0.3s ease;
}

.carousel-nav span:hover {
  background: rgba(0,0,0,0.6);
}

/* Dots */
.carousel-dots {
  position: absolute;
  bottom: 20px;
  width: 100%;
  text-align: center;
  z-index: 10;
}

.dot {
  display: inline-block;
  width: 12px;
  height: 12px;
  margin: 0 6px;
  background: rgba(255,255,255,0.5);
  border-radius: 50%;
  cursor: pointer;
  transition: background 0.3s, transform 0.3s;
}

.dot.active {
  background: #fff;
  transform: scale(1.3);
}

/* FOOTER */
.footer {
  background: var(--primary-color);
  color: #fff;
  padding: 30px 20px;
  margin-top: auto;
  text-align: center;
}
</style>
</head>
<body>

<!-- NAVIGATION -->
<nav>
  <div class="nav__container">
    <div class="nav__logo">
      <img src="logo.png" alt="Luna Vista Resort Logo">
    </div>
    <ul class="nav__links">
      <li><a href="index.html">Home</a></li>
      <li><a href="gallery.html">Gallery</a></li>
      <li><a href="booking.html">Reservations</a></li>
      <li><a href="register.html">Sign Up</a></li>
    </ul>
  </div>
</nav>

<!--HEADING-->

<div class="page-title">Our Gallery</div>

<!-- CAROUSEL -->
<div class="carousel-container">
 <div class="slides">
  <div class="slide">
    <img src="pic1.jpg" alt="Sunset View">
    <div class="slide-caption">Sunset View</div>
  </div>
  <div class="slide">
    <img src="pic2.jpg" alt="Beachfront Pool">
    <div class="slide-caption">Beachfront Pool</div>
  </div>
  <div class="slide">
    <img src="pic3.jpg" alt="Private Cabana">
    <div class="slide-caption">Freshly Served Foods</div>
  </div>
  <div class="slide">
    <img src="pic4.jpg" alt="Evening Dining">
    <div class="slide-caption">Relaxing Vibes</div>
  </div>
</div>


  <div class="carousel-nav">
    <span class="prev">&#10094;</span>
    <span class="next">&#10095;</span>
  </div>

  <div class="carousel-dots">
    <span class="dot active"></span>
    <span class="dot"></span>
    <span class="dot"></span>
    <span class="dot"></span>
    <span class="dot"></span>
  </div>
</div>

<!-- FOOTER -->
<footer class="footer">
  © 2026 Luna Vista Resort
</footer>

<script>
// JS Carousel
const slides = document.querySelectorAll('.slide');
const dots = document.querySelectorAll('.dot');
const next = document.querySelector('.next');
const prev = document.querySelector('.prev');
let current = 0;

function showSlide(i) {
  if(i >= slides.length) current = 0;
  else if(i < 0) current = slides.length - 1;
  else current = i;

  const offset = -current * 100;
  document.querySelector('.slides').style.transform = `translateX(${offset}%)`;

  // Set active class for slides
  slides.forEach(slide => slide.classList.remove('active'));
  slides[current].classList.add('active');

  // Set active class for dots
  dots.forEach(dot => dot.classList.remove('active'));
  dots[current].classList.add('active');
}
// Arrow clicks
next.addEventListener('click', () => showSlide(current + 1));
prev.addEventListener('click', () => showSlide(current - 1));

// Dot clicks
dots.forEach((dot, idx) => {
  dot.addEventListener('click', () => showSlide(idx));
});

// Auto-slide every 4s
setInterval(() => showSlide(current + 1), 4000);
</script>

</body>
</html>
