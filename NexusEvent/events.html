<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nexus Events</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}

body{
  background:#0f0f1a;
  color:#fff;
  overflow-x:hidden;
}

/* BACKGROUND */
.video-bg{
  position:fixed;
  width:100%;
  height:100%;
  object-fit:cover;
  z-index:-2;
}
.overlay{
  position:fixed;
  width:100%;
  height:100%;
  background:rgba(10,10,20,0.75);
  backdrop-filter:blur(5px);
  z-index:-1;
}

/* HEADER */
header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px 30px;
  background:linear-gradient(270deg,#ff4fd8,#7b5cff,#00e5ff);
  background-size:600% 600%;
  animation:gradientMove 8s ease infinite;
  border-bottom:4px solid #000;
  flex-wrap:wrap;
}

.logo img{
  width:200px;
  height:auto;
}

/* NAV CONTAINER */
nav{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  justify-content:flex-end;
}

/* BUTTON STYLE */
nav a{
  text-decoration:none;
}

nav button{
  padding:10px 18px;
  border:none;
  border-radius:30px;
  background:#00e5ff;
  font-weight:bold;
  cursor:pointer;
  box-shadow:4px 4px 0 #000;
  transition:all 0.25s ease;
}

/* HOVER */
nav button:hover{
  transform:translate(-3px,-3px);
  box-shadow:6px 6px 0 #000;
  background:#ffe600;
}

/* ACTIVE CLICK FEEL */
nav button:active{
  transform:translate(1px,1px);
  box-shadow:2px 2px 0 #000;
}

/* MOBILE FIX */
@media(max-width:768px){
  header{
    flex-direction:column;
    gap:15px;
  }

  nav{
    justify-content:center;
  }
}

/* TITLE */
.title{
  text-align:center;
  margin:50px 0 20px;
  font-size:2.3rem;
  color:#ffe600;
  text-shadow:3px 3px #000;
}

/* SEARCH */
.search-bar{
  max-width:700px;
  margin:auto;
  display:flex;
  gap:10px;
  padding:0 20px;
}
.search-bar input,.search-bar select{
  flex:1;
  padding:12px;
  border-radius:10px;
  border:2px solid #00e5ff;
  background:rgba(255,255,255,0.05);
  color:#fff;
}

/* GRID */
.events-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
  gap:30px;
  padding:40px;
}

/* CARD */
.event-card{
  border-radius:20px;
  overflow:hidden;
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(10px);
  box-shadow:0 0 20px rgba(0,0,0,0.6);
  transition:0.4s;
  opacity:1;
  transform:scale(1);
}

/* HOVER */
.event-card:hover{
  transform:scale(1.05);
  box-shadow:0 0 25px #00ff9f;
}

/* IMAGE */
.event-img{
  position:relative;
  overflow:hidden;
}
.event-img img{
  width:100%;
  height:200px;
  object-fit:cover;
  transition:0.5s;
}
.event-card:hover img{
  transform:scale(1.1);
}

/* IMAGE OVERLAY */
.event-img::after{
  content:"";
  position:absolute;
  width:100%;
  height:100%;
  top:0;
  left:0;
  background:linear-gradient(to top,rgba(0,0,0,0.8),transparent);
}

/* DATE */
.date{
  position:absolute;
  top:10px;
  left:10px;
  background:#00ff9f;
  color:#000;
  padding:5px 12px;
  border-radius:20px;
  font-size:0.8rem;
  font-weight:bold;
}

/* CONTENT */
.content{
  padding:20px;
}
.content h3{
  color:#00e5ff;
  margin-bottom:10px;
}
.content p{
  color:#ccc;
  font-size:0.9rem;
  margin-bottom:15px;
}

/* TAGS */
.tags{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
  margin-bottom:15px;
}
.tags span{
  background:#ff4fd8;
  padding:4px 10px;
  border-radius:20px;
  font-size:0.75rem;
}

/* BUTTON */
.btn{
  display:block;
  text-align:center;
  padding:12px;
  border-radius:30px;
  background:#00ff9f;
  color:#000;
  font-weight:bold;
  text-decoration:none;
  transition:0.3s;
}
.btn:hover{
  box-shadow:0 0 15px #00ff9f,0 0 30px #00ff9f;
  transform:translateY(-2px);
}

/* HIDE ANIMATION */
.hide{
  opacity:0;
  transform:scale(0.8);
  pointer-events:none;
}

/* FOOTER */
footer{
  text-align:center;
  padding:20px;
  background:#000;
}
</style>
</head>

<body>

<video autoplay muted loop class="video-bg">
  <source src="background.mp4">
</video>
<div class="overlay"></div>

<header>
  <div class="logo">
    <img src="logo.png" alt="logo">
  </div>

  <nav>
    <a href="index.html"><button>Home</button></a>
    <a href="events.html"><button>Events</button></a>
    <a href="tickets.html"><button>Tickets</button></a>
    <a href="venue.html"><button>Venue</button></a>
    <a href="contact.html"><button>Contact</button></a>
    <a href="admin.html"><button>Admin</button></a>
  </nav>
</header>

<h1 class="title">Explore Events</h1>

<div class="search-bar">
  <input id="searchInput" placeholder="Search events...">
  <select id="tagFilter">
    <option value="">All</option>
    <option value="EDM">EDM</option>
    <option value="House">House</option>
    <option value="Art">Art</option>
  </select>
</div>

<div class="events-grid" id="eventsGrid">

<!-- CARD -->
<div class="event-card" data-tags="EDM">
  <div class="event-img">
    <img src="yao.jpg">
    <div class="date">June 20</div>
  </div>
  <div class="content">
    <h3>Astral Beats Festival</h3>
    <p>Cosmic EDM rave with neon visuals.</p>
    <div class="tags"><span>EDM</span></div>
    <a href="#" class="btn">Tickets</a>
  </div>
</div>

<div class="event-card" data-tags="House">
  <div class="event-img">
    <img src="robin.jpg">
    <div class="date">July 15</div>
  </div>
  <div class="content">
    <h3>Lunar Groove</h3>
    <p>Chillwave night under glowing moons.</p>
    <div class="tags"><span>House</span></div>
    <a href="#" class="btn">Tickets</a>
  </div>
</div>

<div class="event-card" data-tags="Art">
  <div class="event-img">
    <img src="aod.jpg">
    <div class="date">Aug 10</div>
  </div>
  <div class="content">
    <h3>Stellar Expo</h3>
    <p>Futuristic art installations.</p>
    <div class="tags"><span>Art</span></div>
    <a href="#" class="btn">Tickets</a>
  </div>
</div>

</div>

<footer>© 2026 Nexus Events</footer>

<script>
const searchInput=document.getElementById('searchInput');
const tagFilter=document.getElementById('tagFilter');
const cards=document.querySelectorAll('.event-card');

function filter(){
  const text=searchInput.value.toLowerCase();
  const tag=tagFilter.value;

  cards.forEach(card=>{
    const name=card.querySelector('h3').textContent.toLowerCase();
    const tags=card.dataset.tags;

    const matchText=name.includes(text);
    const matchTag=!tag || tags.includes(tag);

    if(matchText && matchTag){
      card.classList.remove('hide');
    } else{
      card.classList.add('hide');
    }
  });
}

searchInput.addEventListener('input',filter);
tagFilter.addEventListener('change',filter);
</script>

</body>
</html>
