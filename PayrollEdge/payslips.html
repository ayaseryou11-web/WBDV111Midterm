<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Payroll Edge - Payslip</title>

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: url('background.png') no-repeat center center fixed;
      background-size: cover;
      color: #fff;
      min-height: 100vh;
    }

    .overlay {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,40,0.85);
      z-index: 0;
    }

    header {
      background: rgba(0,0,64,0.9);
      display: flex;
      align-items: center;
      padding: 15px 40px;
      box-shadow: 0 0 15px rgba(0,0,0,0.6);
      position: relative;
      z-index: 1;
    }

    header img.logo {
      width: 130px;
      margin-right: 30px;
    }

    nav {
      display: flex;
      gap: 15px;
      margin-left: auto;
    }

    nav a {
      padding: 10px 18px;
      border-radius: 8px;
      color: #cce6ff;
      text-decoration: none;
      font-weight: 600;
      transition: 0.3s;
    }

    nav a.active {
      background: linear-gradient(120deg, #00c4ff, #0066ff);
      color: #fff;
      box-shadow: 0 0 15px #00c4ff;
    }

    .container {
      padding: 40px;
      text-align: center;
      position: relative;
      z-index: 1;
    }

    h1 {
      color: #00c4ff;
      text-shadow: 0 0 12px #00c4ff;
    }

    /* Cards */
    .card {
      background: rgba(10,20,60,0.9);
      border-radius: 14px;
      padding: 25px;
      margin: 20px auto;
      max-width: 600px;
      box-shadow: 0 0 20px rgba(0,0,0,0.6);
    }

    .highlight {
      font-size: 26px;
      font-weight: bold;
      color: #00ff99;
      text-shadow: 0 0 12px #00ff99;
    }

    .payday {
      font-size: 28px;
      font-weight: bold;
      color: #00c4ff;
      text-shadow: 0 0 15px #00c4ff;
    }

    .verified {
      color: #00ff99;
      font-weight: bold;
    }

    /* Deduction list */
    .deductions {
      text-align: left;
      margin-top: 20px;
    }

    .deductions p {
      display: flex;
      justify-content: space-between;
      margin: 8px 0;
    }

    .deductions span {
      color: #ff4d4d;
      font-weight: bold;
    }

    .total-deduction {
      border-top: 1px solid rgba(255,255,255,0.2);
      margin-top: 10px;
      padding-top: 10px;
      font-weight: bold;
      color: #ff4d4d;
    }

    .net {
      margin-top: 20px;
      font-size: 22px;
      color: #00ff99;
      text-shadow: 0 0 10px #00ff99;
    }

  </style>
</head>

<body>

<div class="overlay"></div>

<header>
  <img src="logo.png" class="logo">
  <nav>
    <a href="index.html">Staff</a>
    <a href="timesheets.html">Timesheets</a>
    <a href="payslips.html">Payslips</a>
    <a href="login.html">Logout</a>
  </nav>
</header>

<div class="container">

  <h1>Payslip Summary</h1>

  <!-- Payday -->
  <div class="card">
    <p>Next Payday:</p>
    <div class="payday" id="payday"></div>
  </div>

  <!-- Hours + Status -->
  <div class="card">
    <p>Total Hours Worked</p>
    <div class="highlight" id="hours"></div>

    <p id="sampleNote" style="color:#ffcc00; font-size:13px;"></p>

    <p>Status: <span class="verified">✔ Verified</span></p>
  </div>

  <!-- Deductions -->
  <div class="card">
    <h3>Tax & Deductions</h3>

    <div class="deductions">
      <p>Withholding Tax <span id="tax"></span></p>
      <p>SSS Contribution <span id="sss"></span></p>
      <p>PhilHealth <span id="philhealth"></span></p>
      <p>Pag-IBIG <span id="pagibig"></span></p>

      <p class="total-deduction">
        Total Deductions <span id="totalDeduction"></span>
      </p>
    </div>

    <div class="net">
      Net Pay: <span id="netPay"></span>
    </div>
  </div>

</div>

<script>

/* Active nav */
const links = document.querySelectorAll("nav a");
const currentPage = window.location.pathname.split("/").pop();
links.forEach(link => {
  if (link.getAttribute("href") === currentPage) {
    link.classList.add("active");
  }
});

/* Get hours */
let hours = localStorage.getItem("totalHours");

if (!hours || hours == 0) {
  // ✅ Sample data (your example)
  hours = 45;
} else {
  hours = parseInt(hours);
}
document.getElementById("hours").innerText = hours + " hrs";

/* Payday (next Friday) */
let today = new Date();
let payday = new Date();
payday.setDate(today.getDate() + (5 - today.getDay() + 7) % 7);

document.getElementById("payday").innerText = payday.toDateString();

/* Pay calculation */
let rate = 100; // hourly rate (you can change)
let gross = hours * rate;

/* Deductions (sample PH values) */
let tax = gross * 0.12;
let sss = gross * 0.045;
let philhealth = gross * 0.03;
let pagibig = 200;

let totalDeduction = tax + sss + philhealth + pagibig;
let net = gross - totalDeduction;

/* Display */
document.getElementById("tax").innerText = "- ₱" + tax.toFixed(2);
document.getElementById("sss").innerText = "- ₱" + sss.toFixed(2);
document.getElementById("philhealth").innerText = "- ₱" + philhealth.toFixed(2);
document.getElementById("pagibig").innerText = "- ₱" + pagibig.toFixed(2);

document.getElementById("totalDeduction").innerText = "- ₱" + totalDeduction.toFixed(2);
document.getElementById("netPay").innerText = "₱" + net.toFixed(2);

if (!localStorage.getItem("totalHours")) {
  document.getElementById("sampleNote").innerText = "(Sample Data Preview)";
}

</script>

</body>
</html>
