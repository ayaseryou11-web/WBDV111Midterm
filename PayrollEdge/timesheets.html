<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Payroll Edge - Weekly Timesheet</title>

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: url('background.png') no-repeat center center fixed;
      background-size: cover;
      color: #fff;
      position: relative;
      min-height: 100vh;
    }

    .overlay {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background-color: rgba(0, 0, 40, 0.85);
      z-index: 0;
    }

    header {
      background: rgba(0,0,64,0.9);
      display: flex;
      align-items: center;
      padding: 15px 40px;
      box-shadow: 0 0 15px rgba(0,0,0,0.6);
      position: relative;
      z-index: 1;
    }

    header img.logo {
      width: 130px;
      margin-right: 30px;
    }

    nav {
      display: flex;
      gap: 15px;
      margin-left: auto;
    }

    nav a {
      position: relative;
      padding: 10px 18px;
      border-radius: 8px;
      color: #cce6ff;
      text-decoration: none;
      font-weight: 600;
      font-size: 15px;
      transition: all 0.3s ease;
    }

    nav a::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(120deg, #00c4ff, #0066ff);
      opacity: 0;
      transition: 0.3s ease;
      z-index: -1;
      border-radius: 8px;
    }

    nav a:hover::before { opacity: 0.2; }

    nav a:hover {
      color: #fff;
      text-shadow: 0 0 8px #00c4ff;
      transform: translateY(-2px);
    }

    nav a.active {
      background: linear-gradient(120deg, #00c4ff, #0066ff);
      color: white;
      box-shadow: 0 0 15px #00c4ff;
    }

    .container {
      padding: 40px;
      text-align: center;
      position: relative;
      z-index: 1;
    }

    h1 {
      font-size: 32px;
      color: #00c4ff;
      text-shadow: 0 0 12px #00c4ff;
      margin-bottom: 10px;
    }

    .week {
      margin-bottom: 30px;
      color: #cce6ff;
      font-size: 16px;
    }

    /* Form */
    .form-box {
      background: rgba(10,20,60,0.9);
      padding: 20px;
      border-radius: 12px;
      margin-bottom: 30px;
      box-shadow: 0 0 20px rgba(0,0,0,0.6);
    }

    .form-box input, .form-box select {
      padding: 10px;
      margin: 10px;
      border-radius: 6px;
      border: none;
      outline: none;
      width: 180px;
    }

    .form-box button {
      padding: 10px 20px;
      border: none;
      border-radius: 6px;
      background: linear-gradient(120deg, #00c4ff, #0066ff);
      color: white;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
    }

    .form-box button:hover {
      transform: scale(1.05);
      box-shadow: 0 0 10px #00c4ff;
    }

    /* Table */
    table {
      width: 100%;
      border-collapse: collapse;
      background: rgba(0,0,50,0.8);
      border-radius: 10px;
      overflow: hidden;
    }

    th, td {
      padding: 12px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }

    th {
      background: rgba(0,0,80,0.9);
      color: #00c4ff;
    }

    tr:hover {
      background: rgba(0,196,255,0.1);
    }

    /* Submit button */
    .submit-btn {
      margin-top: 30px;
      padding: 12px 30px;
      border: none;
      border-radius: 8px;
      background: linear-gradient(120deg, #00ff99, #00c4ff);
      color: #000;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
    }

    .submit-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 0 15px #00ff99;
    }
    
    .total-hours {
  margin-top: 20px;
  font-size: 18px;
  font-weight: bold;
  color: #00ff99;
  text-shadow: 0 0 10px #00ff99;
}
  </style>
</head>
<body>

<div class="overlay"></div>

<header>
  <img src="logo.png" class="logo">
  <nav>
    <a href="index.html">Staff</a>
    <a href="timesheets.html">Timesheets</a>
    <a href="payslips.html">Payslips</a>
    <a href="login.html">Logout</a>
  </nav>
</header>

<div class="container">
  <h1>Weekly Timesheet</h1>
  <div class="week" id="weekDisplay"></div>

  <!-- Input Form -->
  <div class="form-box">
    <select id="day">
      <option>Monday</option>
      <option>Tuesday</option>
      <option>Wednesday</option>
      <option>Thursday</option>
      <option>Friday</option>
    </select>

    <input type="number" id="hours" placeholder="Hours Worked">
    <input type="text" id="task" placeholder="Task Description">

    <button onclick="addEntry()">Add Log</button>
  </div>

  <!-- Table -->
  <table>
    <thead>
      <tr>
        <th>Day</th>
        <th>Hours</th>
        <th>Task</th>
      </tr>
    </thead>
    <tbody id="tableBody"></tbody>
  </table>

  <!-- Total Hours -->

  <div class="total-hours">
  Total Hours: <span id="totalHours">0</span>
</div>

  <!-- Submit -->
  <button class="submit-btn" onclick="submitLog()">Submit Log</button>

</div>

<script>
/* Active nav */
const links = document.querySelectorAll("nav a");
const currentPage = window.location.pathname.split("/").pop();
links.forEach(link => {
  if (link.getAttribute("href") === currentPage) {
    link.classList.add("active");
  }
});

/* Show current week */
const today = new Date();
const start = new Date(today.setDate(today.getDate() - today.getDay()));
const end = new Date(start);
end.setDate(start.getDate() + 6);

document.getElementById("weekDisplay").innerText =
  "Week: " + start.toDateString() + " - " + end.toDateString();

/* Add entry */
let total = 0;

function addEntry() {
  let day = document.getElementById("day").value;
  let hours = parseInt(document.getElementById("hours").value);
  let task = document.getElementById("task").value;

  if (!hours || !task) {
    alert("Please fill all fields!");
    return;
  }

  let row = `
    <tr>
      <td>${day}</td>
      <td>${hours}</td>
      <td>${task}</td>
    </tr>
  `;

  document.getElementById("tableBody").innerHTML += row;

  // ✅ Update total hours
  total += hours;
  document.getElementById("totalHours").innerText = total;

  // Reset inputs
  document.getElementById("hours").value = "";
  document.getElementById("task").value = "";
}

/* Submit log */
function submitLog() {
  window.location.href = "payslips.html";
}
</script>

</body>
</html>
